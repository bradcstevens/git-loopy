name: Runner family gate

# Anti-drift gate for the whole Runner family (ADR-0013, docs/wrapper-contract.md).
# Every push, pull request, and calling release workflow must prove that the Python
# reference Orchestrator and the shell + PowerShell ports still implement the same
# Wrapper contract on the operating systems each member claims to support. All jobs
# use fake external tools and scratch repositories, so the gate needs neither live
# Copilot nor GitHub credentials. The shape of this file is pinned by
# git-loopy/python/tests/test_runner_family_gate.py.

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    name: python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Python Conformance adapter
        run: >-
          uv run --project git-loopy/python --all-extras
          python -m pytest -q git-loopy/python/tests/test_conformance.py
          git-loopy/python/tests/test_release_identity_conformance.py
          git-loopy/python/tests/test_continuation_scenarios.py

      - name: Python test suite
        run: >-
          uv run --project git-loopy/python --all-extras
          python -m pytest -q git-loopy/python/tests

  shell:
    name: shell / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell prerequisites
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install bash jq
            echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          else
            sudo apt-get update
            sudo apt-get install --yes jq
          fi

      - name: Run shell smoke suite
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            BASH_BIN="$(brew --prefix)/bin/bash"
          else
            BASH_BIN="$(command -v bash)"
          fi
          "$BASH_BIN" --version
          "$BASH_BIN" -n \
            git-loopy/shell/git-loopy.sh \
            git-loopy/shell/lib/continuation.sh \
            git-loopy/shell/lib/events.sh \
            git-loopy/shell/lib/orchestrator.sh \
            git-loopy/shell/tests/*.sh
          "$BASH_BIN" git-loopy/shell/tests/test-event-conformance.sh
          "$BASH_BIN" git-loopy/shell/tests/test-orchestrator-conformance.sh
          "$BASH_BIN" git-loopy/shell/tests/test-continuation-conformance.sh
          "$BASH_BIN" git-loopy/shell/tests/test-orchestrator-boundary.sh

  powershell:
    name: PowerShell / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PowerShell smoke suite
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7) {
            throw "PowerShell 7+ is required."
          }
          pwsh -NoLogo -NoProfile -File `
            git-loopy/powershell/tests/test-event-conformance.ps1
          pwsh -NoLogo -NoProfile -File `
            git-loopy/powershell/tests/test-orchestrator-conformance.ps1
          pwsh -NoLogo -NoProfile -File `
            git-loopy/powershell/tests/test-continuation-conformance.ps1
          pwsh -NoLogo -NoProfile -File `
            git-loopy/powershell/tests/test-orchestrator-boundary.ps1
